<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>OutfitArc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .product {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      margin-top: 5px;
      background: black;
      color: white;
      padding: 6px 10px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>OutfitArc</header>

<div class="container">
  <h2>Outfit All Black</h2>

  <div class="product">
    <h3>Test</h3>
    <p>Rp 50.000</p>
    <a href="#" class="btn">TikTok Shop</a>
  </div>

  <div class="product">
    <h3>Track Jacket</h3>
    <p>Rp 107.000</p>
    <a href="#" class="btn">TikTok Shop</a>
  </div>

  <div class="product">
    <h3>T-Shirt</h3>
    <p>Rp 30.000</p>
    <a href="#" class="btn">TikTok Shop</a>
  </div>

</div>

</body>
</html>
